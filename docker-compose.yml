services:
  odoo:
    image: odoo:18.0
    container_name: odoo
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8201:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./addons:/mnt/extra-addons
    networks:
      - general-net
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - general-net

volumes:
  odoo-data:
  db-data:

networks:
  general-net:
    external: true